  - id: OPS-21.1.1-D
    status: enforced
    owner: Isadora
    target: autonomous-sender state transitions tested incl. concurrent claim
    notes: "Doctrine cell stale. The concurrent-claim primitive EXISTS at email-pipeline.ts:2460-2482 — `UPDATE drafts SET status='auto_send_sending' WHERE id=X AND status='auto_send_pending' RETURNING ...`. Postgres serializes UPDATEs on the same row via row-level lock; the conditional WHERE acts as the atomic claim — concurrent ticks see zero rows back and skip (file's own comment lines 2457-2459 documents this). Functionally equivalent to FOR UPDATE SKIP LOCKED for the single-row claim case (SKIP LOCKED is needed for queue-style multi-row grabs which autonomous-sender doesn't do). Doctrine note asked for 'FOR UPDATE / SKIP LOCKED / advisory_lock' specifically; the conditional-update pattern achieves the same goal. Promoted to enforced after audit."
    severity: critical

