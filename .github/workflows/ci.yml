# Lightweight pre-deploy gate. Runs on every push to master AND every
# pull request. Vercel runs `next build` on deploy which already catches
# TypeScript errors, but this workflow adds pure-function unit tests
# (normalize-source + booking-signal) that Vercel doesn't exercise.
#
# What this does NOT do:
#  - Run the e2e Playwright suite (needs Supabase secrets + running
#    dev server; lives as a manual gate).
#  - Run scripts/e2e-data-flow-test.mjs (needs TEST_HARNESS_SECRET +
#    live Supabase; also manual).
#
# Add those later if the failure cost grows.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit tests — normalizeSource
        run: npx tsx scripts/test-normalize-source.ts

      - name: Unit tests — detectBookingSignal
        run: npx tsx scripts/test-booking-signal.ts

      - name: Unit tests — redact (PII log scrubbing)
        run: npx tsx scripts/test-redact.ts

      - name: Unit tests — formatBloomNumber (.B graduation)
        run: npx tsx scripts/test-bloom-number.ts

      - name: Unit tests — T1-J bandaids (B-17 / B-19 / B-21 primitives)
        run: npx tsx scripts/test-t1j-bandaids.ts

      - name: Unit tests — structured logger (T1-G)
        run: npx tsx scripts/test-logger.ts

      - name: Unit tests — AI circuit breaker (T1-F)
        run: npx tsx scripts/test-circuit-breaker.ts

      - name: Unit tests — per-platform identity windows (T2-D)
        run: npx tsx scripts/test-identity-windows.ts

      - name: Unit tests — HoneyBook lifecycle events (T2-F)
        run: npx tsx scripts/test-honeybook-lifecycle.ts

      - name: Unit tests — heat-map dedup patterns (2026-05-01 fix)
        run: npx tsx scripts/test-heatmap-fix.ts

      - name: Unit tests — OMI audio-capture adapter (T2-E Phase 2)
        run: npx tsx scripts/test-audio-capture-omi.ts

      - name: Unit tests — External Context loaders + Bonferroni threshold (T2-C)
        run: npx tsx scripts/test-external-context.ts

      - name: Integration test — cancellation guard (self-skips without .env.local)
        run: npx tsx scripts/test-cancellation-guard-integration.ts

      - name: Unit tests — T3 insight foundation (confidence + numbers-guard + cache key)
        run: npx tsx scripts/test-insights-foundation.ts

      - name: Unit tests — T3-D cohort-match similarity helpers
        run: npx tsx scripts/test-cohort-match.ts

      - name: Unit tests — T3-E cultural-moments auto-propose (z-score spike)
        run: npx tsx scripts/test-cultural-moments-auto-propose.ts

      - name: Unit tests — T3-F pricing-elasticity classifier (confound + sample-size guards)
        run: npx tsx scripts/test-pricing-elasticity.ts

      - name: Unit tests — T3-G source-mix counterfactual (concave curve + pair selection)
        run: npx tsx scripts/test-source-mix-counterfactual.ts

      - name: White-label check — no hardcoded 'Sage' in couple portal
        run: node scripts/check-no-hardcoded-sage.mjs
